<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Futeboletras</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #031b0f;
      color: #fffdf0;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    main {
      width: min(520px, calc(100% - 40px));
      padding: 36px 24px;
      border: 1px solid #1b7f46;
      border-radius: 18px;
      background: #062f1c;
    }
    h1 {
      margin: 0 0 10px;
      font-family: Georgia, serif;
      font-size: 42px;
      line-height: 1;
    }
    p {
      margin: 0;
      color: #c9e8cf;
      font-weight: 700;
      line-height: 1.5;
    }
    strong {
      display: block;
      margin-top: 18px;
      color: #fff367;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Futeboletras</h1>
    <p>Versao de desenvolvimento privada.</p>
    <strong>DigitalArts</strong>
  </main>
</body>
</html>
